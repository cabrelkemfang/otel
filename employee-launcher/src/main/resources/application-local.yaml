spring:
  datasource:
    url: jdbc:mysql://localhost:3306/otel_employee_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
    username: root
    password: mysql

  jpa:
    show-sql: true

management:
  otlp:
    metrics:
      export:
        url: http://localhost:4320/v1/metrics
  opentelemetry:
    tracing:
      export:
        otlp:
          endpoint: http://localhost:4320/v1/traces
    logging:
      export:
        otlp:
          endpoint: http://localhost:4320/v1/logs

logging:
  file:
    path: logs
  level:
    io.growtogether: DEBUG
